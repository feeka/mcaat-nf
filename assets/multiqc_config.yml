report_comment: >
  This report has been generated by the <a href="https://github.com/RNABioInfo/mcaat-nf"
  target="_blank">RNABioInfo/mcaat-nf</a> analysis pipeline. CRISPR arrays are detected
  directly in unassembled reads by <a href="https://github.com/RNABioInfo/mcaat"
  target="_blank">MCAAT</a>. Information about interpreting these results can be found in the
  <a href="https://github.com/RNABioInfo/mcaat-nf/blob/main/docs/output.md"
  target="_blank">documentation</a>.

report_section_order:
  "RNABioInfo-mcaat-nf-summary":
    order: -1000
  "RNABioInfo-mcaat-nf-methods-description":
    order: -1001
  "software_versions":
    order: -1002

export_plots: true

disable_version_detection: true

# ---------------------------------------------------------------------------
# Custom content produced by this pipeline.
#
# NOTE: no `sp:` search patterns are defined here on purpose. Every file this
# pipeline emits for MultiQC is named `*_mqc.tsv` or `*_mqc.yaml` and carries
# its own `id:`, `plot_type:` and `headers:` preamble, so MultiQC discovers and
# configures it through the zero-config "magic filename" mechanism. That means
# the report still renders correctly when a user supplies their own
# `--multiqc_config`, which would otherwise replace the search-pattern block.
#
# The only thing configured here is the ORDER in which the sections appear.
#
# Every id below MUST be one that `bin/mcaat_multiqc_sections.py` actually
# emits, and every id that script emits MUST appear here -- an id listed but
# never written is silently ignored, and an id written but never listed floats
# to an arbitrary position in the report. The five ids below are, in emission
# order:
#
#   mcaat_cohort_summary   <- mcaat_cohort_summary_mqc.yaml   (table)
#   mcaat_arrays_bargraph  <- mcaat_arrays_bargraph_mqc.tsv   (bargraph)
#   mcaat_spacerlen        <- mcaat_spacerlen_mqc.tsv         (linegraph)
#   mcaat_repeatlen        <- mcaat_repeatlen_mqc.tsv         (linegraph)
#   mcaat_sharing          <- mcaat_sharing_mqc.tsv           (heatmap)
#
# `mcaat_genstats` is deliberately absent: it is a General Statistics
# contribution from the per-sample `<sample>_mcaat_genstats_mqc.tsv` files, not
# a section of its own, and it is configured by the two blocks below instead.
# ---------------------------------------------------------------------------
custom_content:
  order:
    - mcaat_cohort_summary
    - mcaat_arrays_bargraph
    - mcaat_spacerlen
    - mcaat_repeatlen
    - mcaat_sharing

# General Statistics columns contributed by the per-sample
# `<sample>_mcaat_genstats_mqc.tsv` files. Samples with zero detected arrays
# are reported as an explicit 0, never omitted.
table_columns_visible:
  mcaat_genstats:
    CRISPR_arrays: true
    CRISPR_spacers: true

table_columns_placement:
  mcaat_genstats:
    CRISPR_arrays: 900
    CRISPR_spacers: 910

# Human-readable names for the pipeline's own processes in the "Software
# Versions" section and elsewhere.
module_order:
  - fastqc:
      name: "FastQC (raw)"
      anchor: "fastqc_raw"
      info: "This section reports FastQC metrics computed on the reads exactly as they arrive from the samplesheet."
      path_filters:
        - "*raw*"
  - fastp
  - bowtie2
  - bbmap
  - seqkit
  - fastqc:
      name: "FastQC (trimmed)"
      anchor: "fastqc_trimmed"
      info: "This section reports FastQC metrics computed on the reads that are actually handed to MCAAT, i.e. after trimming, host depletion, phiX removal and subsampling."
      path_filters:
        - "*trimmed*"
